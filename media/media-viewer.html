<!-- UNIVERSAL MEDIA ENGINE -->
<!-- VERSION 2 -->
<!-- CORE COMPONENT -->

<div id="media-viewer" class="media-viewer hidden">

    <!-- ================================================ -->
    <!-- BACKDROP -->
    <!-- ================================================ -->

    <div id="viewer-backdrop" class="viewer-backdrop"></div>

    <!-- ================================================ -->
    <!-- VIEWER CONTAINER -->
    <!-- ================================================ -->

    <div class="viewer-container">

        <!-- Close -->

        <button
            id="close-viewer"
            class="viewer-close"
            aria-label="Close Viewer">

            ✕

        </button>

        <!-- ========================= -->
        <!-- IMAGE -->
        <!-- ========================= -->

        <img
            id="viewer-image"
            class="viewer-image"
            hidden
            draggable="false"
            alt="Furniture Preview">

        <!-- ========================= -->
        <!-- VIDEO -->
        <!-- ========================= -->

        <video
            id="viewer-video"
            class="viewer-video"
            hidden
            controls
            preload="metadata"
            playsinline
            webkit-playsinline
            loop>

            Your browser does not support video playback.

        </video>

        <!-- ========================= -->
        <!-- FULLSCREEN -->
        <!-- ========================= -->

        <button
            id="fullscreen-btn"
            class="fullscreen-btn"
            hidden
            aria-label="Fullscreen">

            ⛶

        </button>

    </div>

</div>
