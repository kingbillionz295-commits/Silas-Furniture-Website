<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silas Furniture Assistant</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<link rel="stylesheet" href="../css/ai.css">

</head>

<body>

<header class="ai-header">

<button id="back-btn">

<span class="material-symbols-outlined">

arrow_back

</span>

</button>

<div class="assistant-title">

🤖 Silas Furniture Assistant

</div>

</header>

<main id="chat-container">

<section id="welcome-screen">

<h1 id="welcome-title">
    How can I help you today?
</h1>

<div id="welcome-message">

<!-- AI Welcome Bubble will appear here -->

</div>

</section>

<section id="chat-area">

<!-- Future AI & Customer Messages -->

</section>

</main>

<footer id="chat-input-container">

<div id="chat-input-box">

<input
type="text"
id="message-input"
placeholder="Message Silas Assistant...">

<button id="send-btn">

<span class="material-symbols-outlined">

send

</span>

</button>

</div>

</footer>

<script type="module" src="../scripts/ai.js"></script>

</body>

</html>
