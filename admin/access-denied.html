<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
margin:0;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
color:white;
}

.card{

width:380px;
max-width:90%;
background:#1b1b1b;
border-radius:20px;
padding:35px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.45);

animation:pop .35s ease;

}

@keyframes pop{

from{
opacity:0;
transform:scale(.9);
}

to{
opacity:1;
transform:scale(1);
}

}

.icon{

font-size:70px;
margin-bottom:15px;

}

h1{

color:#ff4444;

margin-bottom:12px;

}

p{

color:#d0d0d0;
line-height:1.6;

}

button{

margin-top:25px;
padding:14px 22px;
border:none;
border-radius:12px;
background:#D4AF37;
font-weight:bold;
cursor:pointer;

}

button:hover{

transform:scale(1.03);

}

</style>

</head>

<body>

<div class="card">

<div class="icon">🚫</div>

<h1>Access Denied</h1>

<p>

Your Google account is not registered as an Administrator.

</p>

<p>

Please contact the website owner if you believe this is a mistake.

</p>

<button onclick="location.href='../index.html'">

Return to Website

</button>

</div>

</body>
</html>
