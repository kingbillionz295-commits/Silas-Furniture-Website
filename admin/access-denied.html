<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrator Verification Failed</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
margin:0;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
color:white;
}

.card{

width:420px;
max-width:90%;
background:#1b1b1b;
border-radius:20px;
padding:35px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.45);
animation:pop .35s ease;

}

@keyframes pop{

from{
opacity:0;
transform:scale(.9);
}

to{
opacity:1;
transform:scale(1);
}

}

.icon{

font-size:75px;
margin-bottom:15px;

}

h1{

color:#ff4444;
margin-bottom:15px;

}

p{

color:#d0d0d0;
line-height:1.7;

}

.email{

margin:18px 0;
font-size:18px;
font-weight:bold;
color:#D4AF37;
word-break:break-word;

}

.progress-container{

width:100%;
height:12px;
background:#2b2b2b;
border-radius:20px;
overflow:hidden;
margin-top:20px;

}

.progress-bar{

width:100%;
height:100%;
background:#D4AF37;
transition:width 1s linear;

}

.countdown{

font-size:30px;
font-weight:bold;
margin-top:15px;
color:#D4AF37;

}

.note{

margin-top:20px;
font-size:13px;
color:#888;

}

button{

margin-top:25px;
padding:14px 22px;
border:none;
border-radius:12px;
background:#D4AF37;
font-weight:bold;
cursor:pointer;

}

button:hover{

transform:scale(1.03);

}

</style>

</head>

<body>

<div class="card">

<div class="icon">🚫</div>

<h1>Administrator Verification Failed</h1>

<p>

The email below that you tried to log in with is not a verified administrator.

</p>

<div class="email" id="denied-email">

Loading...

</div>

<p>

Returning safely to the gallery in

</p>

<div class="countdown" id="countdown">

20

</div>

<div class="progress-container">

<div class="progress-bar" id="progressBar"></div>

</div>

<p class="note">

This login attempt has been securely recorded.

</p>

<button onclick="location.href='../index.html'">

Return Now

</button>

</div>

<script type="module">

import { auth } from "../scripts/firebase.js";

import {

onAuthStateChanged,

signOut

}

from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

const email =
document.getElementById("denied-email");

const countdown =
document.getElementById("countdown");

const progressBar =
document.getElementById("progressBar");

onAuthStateChanged(auth,(user)=>{

if(user){

email.textContent=user.email;

}

});

let seconds=20;

const timer=setInterval(async()=>{

seconds--;

countdown.textContent=seconds;

progressBar.style.width=(seconds/20)*100+"%";

if(seconds<=0){

clearInterval(timer);

await signOut(auth);

window.location.replace("../index.html");

}

},1000);

</script>

</body>
</html>
